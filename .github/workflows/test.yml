name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          pip install -e ".[dev,quantum]"

      - name: Lint with ruff
        run: |
          ruff check q_orca/

      - name: Test with pytest
        run: |
          pip install pytest
          pytest --tb=short -v

  mcp-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install
        run: pip install -e ".[mcp]"

      - name: Verify MCP tools
        run: |
          python -m q_orca.cli --tools --json | python -c "import sys,json; tools=json.load(sys.stdin); assert len(tools)==8, f'Expected 8 tools, got {len(tools)}'"
          echo "All 8 MCP tools registered"
